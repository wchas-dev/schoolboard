<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WCHAS School Board</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "DM Sans", sans-serif; cursor: none; }
  * { cursor: none !important; }

  /* ── 16:9 shell ─────────────────────────────────────────────────────── */
  #shell {
    position: fixed; inset: 0;
    background: #000;
  }
  #board {
    position: fixed; inset: 0;
    overflow: hidden; background: #000;
  }

  /* ── Slide area ─────────────────────────────────────────────────────── */
  #slide-area {
    position: absolute; top: 0; left: 0; right: 0; bottom: 72px;
    transition: opacity 0.55s ease;
  }
  #slide-area.fade { opacity: 0; }

  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 5% 7%; overflow: hidden;
  }

  /* ── Bottom bar ─────────────────────────────────────────────────────── */
  /* ── Message display ── */
  #bar-left { display: flex; align-items: center; flex: 1; min-width: 0; overflow: hidden; padding-right: 16px; }
  #logo-wrap { flex-shrink: 0; }
  #ticker-wrap {
    overflow: hidden; flex: 1;
    mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
  }
  #ticker-track {
    display: inline-flex; white-space: nowrap;
    will-change: transform;
    backface-visibility: hidden;
    transform: translate3d(0, 0, 0);
  }
  #ticker-content, #ticker-content-clone {
    font-family: "DM Sans", sans-serif;
    font-size: clamp(16px,2.2vh,22px);
    color: rgba(255,255,255,0.75);
    padding-right: 80px;
  }
  #bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 72px;
    background: rgba(0,0,0,0.82); backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2.4vw; z-index: 10; gap: 12px;
  }
  #message-display { display: flex; align-items: center; overflow: hidden; }
  #message-text {
    font-family: "DM Sans", sans-serif;
    font-size: clamp(15px,2vh,20px);
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    transition: opacity 1s ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  #message-text.visible { opacity: 1; }
  /* Watermark logo — bottom right of slide area */
  #logo-watermark {
    position: absolute; bottom: 82px; right: 2vw;
    z-index: 5; pointer-events: none;
  }
  #logo-watermark img {
    height: clamp(80px,11vh,140px); object-fit: contain;
    opacity: 0.55;
  }
  #clock { text-align: right; flex-shrink: 0; }
  #clock-time { font-size: clamp(26px,3.8vh,38px); font-weight: 700; color: #fff; line-height: 1.2; }
  #clock-date { font-size: clamp(14px,2vh,20px); color: rgba(255,255,255,0.55); }

  /* ── Progress dots ──────────────────────────────────────────────────── */
  #dots { display: flex; gap: 7px; align-items: center; flex-shrink: 0; }
  .dot { height: 8px; border-radius: 4px; transition: all 0.4s ease; background: rgba(255,255,255,0.28); width: 8px; }
  .dot.active { background: #fff; width: 26px; }

  /* ── Slide: Image/Event ─────────────────────────────────────────────── */
  .slide-image { color: #fff; }
  .slide-image .deco-circle {
    position: absolute; width: 55vh; height: 55vh; border-radius: 50%;
    background: rgba(255,255,255,0.05); top: -10vh; right: -8vh;
  }
  .slide-image .s-icon {
    font-size: clamp(56px,9vh,108px); margin-bottom: 3vh;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.35)); position: relative;
  }
  .slide-image h1 {
    font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(32px,6vh,70px); font-weight: 700;
    text-align: center; text-shadow: 0 3px 14px rgba(0,0,0,0.45);
    line-height: 1.15; max-width: 80%; position: relative;
  }
  .slide-image .s-sub {
    font-size: clamp(16px,2.6vh,30px); color: rgba(255,255,255,0.82);
    margin-top: 2.5vh; text-align: center; letter-spacing: 0.4px; position: relative;
  }

  /* ── Slide: Full image background ──────────────────────────────────── */
  .slide-fullimg { background-size: cover; background-position: center; }
  .slide-fullimg .img-overlay {
    display: none; /* overlay removed — not needed without captions */
  }
  .slide-fullimg .img-caption {
    position: absolute; bottom: 12%; left: 0; right: 0;
    text-align: center; color: #fff; padding: 0 8%;
  }
  .slide-fullimg .img-caption h1 {
    font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(28px,5vh,60px); font-weight: 700;
    text-shadow: 0 3px 12px rgba(0,0,0,0.6);
  }
  .slide-fullimg .img-caption p {
    font-size: clamp(14px,2.2vh,26px); color: rgba(255,255,255,0.82); margin-top: 1.5vh;
  }

  /* ── Slide: Text/Announcement ───────────────────────────────────────── */
  .slide-text .card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: clamp(14px,2vh,24px);
    padding: clamp(22px,3.5vh,50px) clamp(26px,4.5vw,58px);
    max-width: 860px; width: 100%; backdrop-filter: blur(12px);
  }
  .slide-text .card h2 {
    font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(24px,4vh,44px); font-weight: 700; color: #fff;
    margin-bottom: clamp(14px,2.2vh,26px);
    border-bottom: 2px solid rgba(255,255,255,0.15);
    padding-bottom: clamp(10px,1.6vh,18px);
  }
  .slide-text .card .body {
    font-size: clamp(15px,2.4vh,26px); color: rgba(255,255,255,0.88);
    line-height: 1.7;
  }
  .slide-text .card .body p { margin: 4px 0; }

  /* ── Slide: Countdown ───────────────────────────────────────────────── */
  .slide-countdown { color: #fff; }
  .slide-countdown .cd-label {
    font-size: clamp(11px,1.7vh,19px); color: rgba(255,255,255,0.55);
    text-transform: uppercase; letter-spacing: 4px; margin-bottom: 1vh;
  }
  .slide-countdown h1 {
    font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(26px,5vh,56px); font-weight: 700;
    text-shadow: 0 3px 12px rgba(0,0,0,0.4); margin-bottom: 4vh;
  }
  .cd-units { display: flex; gap: clamp(10px,2vw,32px); }
  .cd-unit {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: clamp(10px,1.8vh,20px);
    padding: clamp(14px,2.2vh,28px) clamp(16px,2.8vw,38px);
    min-width: clamp(72px,11vw,148px); text-align: center; backdrop-filter: blur(8px);
  }
  .cd-unit .cd-num {
    font-size: clamp(34px,6.5vh,70px); font-weight: 700; line-height: 1;
  }
  .cd-unit .cd-lbl {
    font-size: clamp(10px,1.4vh,16px); color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 3px; margin-top: clamp(5px,0.9vh,9px);
  }

  /* ── Slide: Calendar ────────────────────────────────────────────────── */
  .slide-calendar { color: #fff; }
  .slide-calendar h2 {
    font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(24px,4.2vh,46px); font-weight: 700; margin-bottom: 2.8vh;
  }
  .ev-list { display: flex; flex-direction: column; gap: clamp(7px,1vh,14px); max-width: 820px; width: 100%; }
  .ev-row {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: clamp(9px,1.4vh,16px);
    padding: clamp(9px,1.5vh,18px) clamp(14px,2.2vw,28px);
    display: flex; align-items: center; gap: clamp(10px,1.6vw,20px);
    backdrop-filter: blur(8px);
  }
  .ev-icon { font-size: clamp(18px,3vh,34px); }
  .ev-name { flex: 1; font-size: clamp(13px,2.2vh,24px); font-weight: 600; }
  .ev-date { font-size: clamp(11px,1.7vh,18px); color: rgba(255,255,255,0.52); white-space: nowrap; }

  /* ── Slide: Weather ─────────────────────────────────────────────────── */
  .slide-weather { color: #fff; }
  .slide-weather .wx-loc {
    font-size: clamp(11px,1.7vh,19px); color: rgba(255,255,255,0.52);
    text-transform: uppercase; letter-spacing: 4px; margin-bottom: 0.8vh;
  }
  .slide-weather .wx-icon { font-size: clamp(58px,9.5vh,106px); margin: 1vh 0; }
  .slide-weather .wx-temp {
    font-size: clamp(54px,9.5vh,94px); font-weight: 700; line-height: 1;
  }
  .slide-weather .wx-desc {
    font-size: clamp(15px,2.3vh,26px); color: rgba(255,255,255,0.7); margin-top: 1.5vh;
  }
  .wx-forecast { display: flex; gap: clamp(24px,4.5vw,52px); margin-top: 3.5vh; }
  .wx-day { text-align: center; }
  .wx-day .wd-label { font-size: clamp(11px,1.6vh,17px); color: rgba(255,255,255,0.42); margin-bottom: 0.8vh; }
  .wx-day .wd-icon  { font-size: clamp(26px,4vh,40px); }
  .wx-day .wd-temp  { font-size: clamp(13px,1.8vh,19px); color: #fff; margin-top: 0.7vh; }

  /* ── Loading state ──────────────────────────────────────────────────── */
  #loading {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; flex-direction: column; gap: 16px; color: rgba(255,255,255,0.4);
    font-size: 18px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,255,255,0.5); border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="shell">
  <div id="board">
    <div id="slide-area">
      <div id="loading"><div class="spinner"></div><span>Loading...</span></div>
    </div>
    <!-- Watermark logo — shown on every slide -->
    <div id="logo-watermark">
      <img id="watermark-img" alt="WCHAS" style="display:none">
    </div>

    <div id="bar">
      <div id="bar-left">
        <div id="message-display">
          <span id="message-text"></span>
        </div>
      </div>
      <div id="dots"></div>
      <div id="clock">
        <div id="clock-face">
          <div id="clock-time"></div>
          <div id="clock-date"></div>
        </div>
        <div id="clock-weather" style="display:none;text-align:right;">
          <div id="wx-bar-temp" style="font-size:clamp(26px,3.8vh,38px);font-weight:700;color:#fff;line-height:1.2;"></div>
          <div id="wx-bar-desc" style="font-size:clamp(14px,2vh,20px);color:rgba(255,255,255,0.55);"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
var content   = [];
var settings  = {};
var current   = 0;
var slideTimer = null;
var cdIntervals = [];

// ── Clock ─────────────────────────────────────────────────────────────────────
function tickClock() {
  var now = new Date();
  var time = now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
  var date = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  document.getElementById("clock-time").textContent = time;
  document.getElementById("clock-date").textContent = date;
}
setInterval(tickClock, 1000);
tickClock();

// ── Alternating clock / weather in bottom bar ─────────────────────────────────
var showingWeather = false;
function populateBarWeather() {
  var wx = WEATHER_JSON;
  if (!wx) return;
  document.getElementById("wx-bar-temp").textContent = wx.icon + "  " + wx.temp + "°F";
  document.getElementById("wx-bar-desc").textContent = wx.description + "  ·  Hi " + wx.high + "°  Lo " + wx.low + "°";
}
function toggleBarDisplay() {
  var face = document.getElementById("clock-face");
  var wxEl = document.getElementById("clock-weather");
  if (!WEATHER_JSON) return;
  showingWeather = !showingWeather;
  var fadeOut = showingWeather ? face : wxEl;
  var fadeIn  = showingWeather ? wxEl : face;
  // Fade out current
  fadeOut.style.transition = "opacity 0.8s ease";
  fadeOut.style.opacity = "0";
  setTimeout(function() {
    fadeOut.style.display = "none";
    fadeOut.style.transition = "";
    // Fade in next
    fadeIn.style.display = "block";
    fadeIn.style.opacity = "0";
    fadeIn.style.transition = "opacity 0.8s ease";
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        fadeIn.style.opacity = "1";
      });
    });
  }, 800);
}
// Alternate every 12 seconds
setInterval(toggleBarDisplay, 12000);

// ── Logo ──────────────────────────────────────────────────────────────────────
function renderLogo() {
  var src = LOGO_DATA_URI || "";
  if (src) {
    fetch(proxyImageUrl(src))
      .then(function(r) { return r.text(); })
      .then(function(b64) {
        if (b64) {
          var wm = document.getElementById("watermark-img");
          wm.src = "data:image/jpeg;base64," + b64;
          wm.style.display = "block";
        }
      })
      .catch(function() {
        var wm = document.getElementById("watermark-img");
        if (src) { wm.src = src; wm.style.display = "block"; }
      });
  }
}
function renderLogoText() {
  // No longer used — messages displayed in message-display area
}

// ── Fading message cycler ─────────────────────────────────────────────────────
var messageList  = [];
var messageIndex = 0;
var messageTimer = null;

function renderTicker() {
  var schoolName = settings["schoolName"] || "West Covina Hills Adventist School";
  var extra      = settings["tickerMessage"] || "";

  // Build message list — school name always first
  messageList = ["Welcome to " + schoolName];
  if (extra.trim()) {
    var parts = extra.split("|");
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i].trim();
      if (p) messageList.push(p);
    }
  }

  messageIndex = 0;
  showMessage(messageList[0]);
  scheduleNextMessage();
}

function showMessage(text) {
  var el = document.getElementById("message-text");
  if (!el) return;
  // Fade out
  el.classList.remove("visible");
  setTimeout(function() {
    el.textContent = text;
    // Fade in
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        el.classList.add("visible");
      });
    });
  }, 1000); // wait for fade-out
}

function scheduleNextMessage() {
  if (messageTimer) clearTimeout(messageTimer);
  messageTimer = setTimeout(function() {
    messageIndex = (messageIndex + 1) % messageList.length;
    showMessage(messageList[messageIndex]);
    scheduleNextMessage();
  }, 9000); // show each message for 9 seconds (1s fade in + 7s hold + 1s fade out)
}

// ── Dots ──────────────────────────────────────────────────────────────────────
function renderDots() {
  var container = document.getElementById("dots");
  container.innerHTML = "";
  for (var i = 0; i < content.length; i++) {
    var d = document.createElement("div");
    d.className = "dot" + (i === current ? " active" : "");
    container.appendChild(d);
  }
}

// ── Slide rendering ───────────────────────────────────────────────────────────
function renderSlide(item) {
  cdIntervals.forEach(function(t) { clearInterval(t); });
  cdIntervals = [];

  var type = item["Type"];
  var el   = document.createElement("div");
  el.className = "slide";

  if (type === "image") {
    renderImageSlide(el, item);
  } else if (type === "fullimage") {
    renderFullImageSlide(el, item);
  } else if (type === "text") {
    renderTextSlide(el, item);
  } else if (type === "countdown") {
    renderCountdownSlide(el, item);
  } else if (type === "calendar") {
    renderCalendarSlide(el, item);
  } else if (type === "weather") {
    renderWeatherSlide(el, item);
  } else {
    el.style.background = "#111";
    el.innerHTML = "<p style=\"color:#fff;font-size:24px\">Unknown slide type: " + type + "</p>";
  }
  return el;
}

function renderImageSlide(el, item) {
  var gradient = item["Gradient"] || "linear-gradient(135deg,#1a5e2a,#2d8a4e)";
  el.className += " slide-image";
  el.style.background = gradient;
  if (!item["ImageURL"]) {
    var deco = document.createElement("div"); deco.className = "deco-circle"; el.appendChild(deco);
  }
  var icon = document.createElement("div"); icon.className = "s-icon";
  icon.textContent = item["Icon"] || "📌"; el.appendChild(icon);
  var h1 = document.createElement("h1"); h1.textContent = item["Title"]; el.appendChild(h1);
  if (item["Subtitle"]) {
    var sub = document.createElement("p"); sub.className = "s-sub";
    sub.textContent = item["Subtitle"]; el.appendChild(sub);
  }
  if (item["ImageURL"]) addBgImage(el, item["ImageURL"], 0.4);
}

function renderFullImageSlide(el, item) {
  el.className += " slide-fullimg";
  el.style.background = "#000";
  var img = document.createElement("img");
  img.src = item["ImageURL"]; // base64 data URI baked in at serve time
  img.alt = "";
  img.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;";
  var overlay = document.createElement("div");
  overlay.className = "img-overlay";
  var caption = document.createElement("div");
  caption.className = "img-caption";
  if (item["Title"]) {
    var h1 = document.createElement("h1");
    h1.textContent = item["Title"];
    caption.appendChild(h1);
  }
  if (item["Subtitle"]) {
    var p = document.createElement("p");
    p.textContent = item["Subtitle"];
    caption.appendChild(p);
  }
  el.appendChild(img);
  el.appendChild(overlay);
  el.appendChild(caption);
}

function renderTextSlide(el, item) {
  var bg = (item["Title"] && item["Title"].indexOf("📢") !== -1)
    ? "linear-gradient(160deg,#1a1a2e,#16213e,#0f3460)"
    : "linear-gradient(160deg,#0d1b2a,#1b2838,#1a3a1a)";
  el.className += " slide-text";
  el.style.background = bg;
  var card = document.createElement("div"); card.className = "card";
  var h2 = document.createElement("h2"); h2.textContent = item["Title"]; card.appendChild(h2);
  var body = document.createElement("div"); body.className = "body";
  (item["Body"] || "").split("\n").forEach(function(l) {
    var p = document.createElement("p"); p.textContent = l; body.appendChild(p);
  });
  card.appendChild(body);
  el.appendChild(card);
  if (item["ImageURL"]) addBgImage(el, item["ImageURL"], 0.55);
}

function renderCountdownSlide(el, item) {
  el.className += " slide-countdown";
  el.style.background = "linear-gradient(160deg,#1a0a2e,#2d1b69,#5b2c8e)";

  var titleEl = document.createElement("p");
  titleEl.className = "cd-label";
  titleEl.textContent = "Countdown To";
  var h1 = document.createElement("h1");
  h1.textContent = "\uD83C\uDF93 " + item["Title"];
  var units = document.createElement("div");
  units.className = "cd-units";

  var labels = ["Days", "Hours", "Minutes", "Seconds"];
  // Store direct references instead of querying by ID — element isn't in
  // the document yet when updateCd() first runs, so getElementById returns null.
  var numEls = [];
  labels.forEach(function(lbl) {
    var unit   = document.createElement("div");
    unit.className = "cd-unit";
    var numEl  = document.createElement("div");
    numEl.className = "cd-num";
    numEl.textContent = "--";
    var lblEl  = document.createElement("div");
    lblEl.className = "cd-lbl";
    lblEl.textContent = lbl;
    unit.appendChild(numEl);
    unit.appendChild(lblEl);
    units.appendChild(unit);
    numEls.push(numEl);
  });

  el.appendChild(titleEl);
  el.appendChild(h1);
  el.appendChild(units);

  function updateCd() {
    var target = new Date(item["TargetDate"]);
    var diff   = target - new Date();
    if (diff < 0) diff = 0;
    numEls[0].textContent = pad(Math.floor(diff / 864e5));
    numEls[1].textContent = pad(Math.floor(diff / 36e5)  % 24);
    numEls[2].textContent = pad(Math.floor(diff / 6e4)   % 60);
    numEls[3].textContent = pad(Math.floor(diff / 1e3)   % 60);
  }
  updateCd();
  cdIntervals.push(setInterval(updateCd, 1000));
  if (item["ImageURL"]) addBgImage(el, item["ImageURL"], 0.5);
}

function renderCalendarSlide(el, item) {
  el.className += " slide-calendar";
  el.style.background = "linear-gradient(160deg,#0a2342,#133b5c,#1a5e2a)";

  var h2 = document.createElement("h2");
  h2.textContent = "📅 " + item["Title"];
  var list = document.createElement("div");
  list.className = "ev-list";

  var events = item["Events"] || [];
  events.slice(0, 6).forEach(function(ev) {
    var row = document.createElement("div");
    row.className = "ev-row";
    var dateStr = ev["Date"] ? formatEvDate(ev["Date"]) : "";

    // Split date into day-of-week and month/day for the badge
    var parts = dateStr.split(", "); // e.g. "Sat, Apr 26"
    var dow  = parts[0] || "";
    var mday = parts[1] || dateStr;

    var icon = document.createElement("span");
    icon.className = "ev-icon";
    icon.textContent = ev["Icon"] || "📅";

    var name = document.createElement("span");
    name.className = "ev-name";
    name.textContent = esc(ev["Name"]);

    // Date badge: colored pill with day-of-week + date
    var badge = document.createElement("div");
    badge.style.cssText = [
      "display:flex;flex-direction:column;align-items:center;justify-content:center;",
      "min-width:clamp(64px,9vw,100px);",
      "background:rgba(255,255,255,0.15);",
      "border:1px solid rgba(255,255,255,0.25);",
      "border-radius:clamp(8px,1.2vh,12px);",
      "padding:clamp(4px,0.8vh,8px) clamp(8px,1.2vw,14px);",
      "flex-shrink:0;"
    ].join("");

    var dowEl = document.createElement("span");
    dowEl.style.cssText = "font-size:clamp(10px,1.4vh,14px);color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:1px;line-height:1;";
    dowEl.textContent = dow;

    var mdayEl = document.createElement("span");
    mdayEl.style.cssText = "font-size:clamp(13px,2vh,20px);font-weight:700;color:#fff;line-height:1.3;white-space:nowrap;";
    mdayEl.textContent = mday;

    badge.appendChild(dowEl);
    badge.appendChild(mdayEl);
    row.appendChild(icon);
    row.appendChild(name);
    row.appendChild(badge);
    list.appendChild(row);
  });

  el.appendChild(h2);
  el.appendChild(list);
  if (item["ImageURL"]) addBgImage(el, item["ImageURL"], 0.55);
}

function renderWeatherSlide(el, item) {
  el.className += " slide-weather";
  el.style.background = "linear-gradient(160deg,#0c3547,#1a6b8a,#65b8d6)";

  var wx = WEATHER_JSON;

  // Fallback if weather fetch failed
  if (!wx) {
    wx = {
      temp: "--", feelsLike: "--", description: "Weather Unavailable",
      icon: "🌡️", high: "--", low: "--",
      forecast: [
        { day: "---", icon: "—", high: "--", low: "--" },
        { day: "---", icon: "—", high: "--", low: "--" },
        { day: "---", icon: "—", high: "--", low: "--" },
        { day: "---", icon: "—", high: "--", low: "--" }
      ]
    };
  }

  var fHtml = (wx.forecast || []).map(function(f) {
    return "<div class=\"wx-day\">" +
      "<div class=\"wd-label\">" + f.day + "</div>" +
      "<div class=\"wd-icon\">" + f.icon + "</div>" +
      "<div class=\"wd-temp\">" + f.high + "°<span style=\"opacity:0.5;font-size:0.75em\"> / " + f.low + "°</span></div>" +
      "</div>";
  }).join("");

  el.innerHTML =
    "<p class=\"wx-loc\">West Covina, CA</p>" +
    "<div class=\"wx-icon\">" + wx.icon + "</div>" +
    "<div class=\"wx-temp\">" + wx.temp + "°F</div>" +
    "<p class=\"wx-desc\">" + wx.description + " &nbsp;·&nbsp; Feels like " + wx.feelsLike + "° &nbsp;·&nbsp; High " + wx.high + "° / Low " + wx.low + "°</p>" +
    "<div class=\"wx-forecast\">" + fHtml + "</div>";

  if (item && item["ImageURL"]) addBgImage(el, item["ImageURL"], 0.45);
}

// ── Slide transition ──────────────────────────────────────────────────────────
function goToSlide(idx) {
  if (!content.length) return;
  current = ((idx % content.length) + content.length) % content.length;
  var area  = document.getElementById("slide-area");
  area.classList.add("fade");
  setTimeout(function() {
    area.innerHTML = "";
    area.appendChild(renderSlide(content[current]));
    area.classList.remove("fade");
    renderDots();
    scheduleNext();
  }, 560);
}

function scheduleNext() {
  clearTimeout(slideTimer);
  var dur = (Number(content[current]["Duration"]) || Number(settings["defaultDuration"]) || 8) * 1000;
  slideTimer = setTimeout(function() { goToSlide(current + 1); }, dur);
}

// ── Load content from GAS API ────────────────────────────────────────────────
function loadContent() {
  fetch(GAS_URL + "?view=content")
    .then(function(r) { return r.json(); })
    .then(function(items) {
      if (!items || items.length === 0) {
        document.getElementById("slide-area").innerHTML =
          "<div id=\"loading\"><span style=\"color:rgba(255,255,255,0.6);font-size:18px\">" +
          "No active slides found.</span></div>";
        return;
      }
      content = items;
      goToSlide(0);
    })
    .catch(function(e) {
      setTimeout(loadContent, 10000);
    });
}

function loadSettings() {
  fetch(GAS_URL + "?view=settings")
    .then(function(r) { return r.json(); })
    .then(function(s) {
      settings = s || {};
      LOGO_DATA_URI = settings["logoUrl"] || "";
      renderLogo();
      renderTicker();
      loadContent();
      fetchWeatherAsync();
    })
    .catch(function() {
      settings = {};
      renderTicker();
      loadContent();
    });
}

function fetchWeatherAsync() {
  var wxUrl = GAS_URL + "?view=weather";
  fetch(wxUrl)
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      try {
        var wx = JSON.parse(txt);
        if (wx) {
          WEATHER_JSON = wx;
          populateBarWeather();
        }
      } catch(e) {}
    })
    .catch(function() {});
}

// ── Auto-refresh disabled ────────────────────────────────────────────────────
// Page self-refresh caused white screen hangs inside the GAS sandbox.
// The cron job on the Pi handles Chromium restarts every 15 minutes instead.
function scheduleRefresh() {}

// ── Background image helper ───────────────────────────────────────────────────
// Fetches image through GAS proxy as base64, then sets it as img src.
// This avoids baking large base64 into the HTML at serve time (which crashed Pi).
// Hardcoded exec URL — window.location inside GAS iframe returns internal URL
function proxyImageUrl(url) {
  return GAS_URL + "?view=img&url=" + encodeURIComponent(url);
}

function addBgImage(el, url, overlayOpacity) {
  var opacity = overlayOpacity !== undefined ? overlayOpacity : 0.45;
  var img = document.createElement("img");
  img.src = url; // already a base64 data URI baked in at serve time
  img.alt = "";
  img.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;";
  var overlay = document.createElement("div");
  overlay.style.cssText = "position:absolute;inset:0;background:rgba(0,0,0," + opacity + ");z-index:1;";
  el.insertBefore(overlay, el.firstChild);
  el.insertBefore(img, el.firstChild);
  Array.prototype.forEach.call(el.children, function(child) {
    if (child !== img && child !== overlay) child.style.position = "relative";
    if (child !== img && child !== overlay) child.style.zIndex = "2";
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function pad(n) { return String(n).length < 2 ? "0" + n : String(n); }
function esc(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function formatEvDate(str) {
  var parts = String(str).split("-");
  if (parts.length < 3) return str;
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var days   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
  return days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate();
}

// ── Configuration ────────────────────────────────────────────────────────────
var GAS_URL       = "https://script.google.com/a/macros/westcovinahills.org/s/AKfycbxS59z2_um1MqusGvIEzs9kCUoSUVM7lkMoq510OXlslriT28bRKVM4HLBE8KzAE4WYTw/exec";
var CONTENT_JSON  = [];
var SETTINGS_JSON = {};
var LOGO_DATA_URI = "";
var WEATHER_JSON  = null;

// ── Wake Lock — prevents the screen from sleeping ────────────────────────────
// Uses the Screen Wake Lock API where supported (Chrome, Edge, fully Kiosk).
// Falls back silently on browsers that don't support it.
var wakeLock = null;
function requestWakeLock() {
  if ("wakeLock" in navigator) {
    navigator.wakeLock.request("screen").then(function(lock) {
      wakeLock = lock;
      lock.addEventListener("release", function() {
        // Re-acquire if released (e.g. tab became hidden then visible again)
        setTimeout(requestWakeLock, 2000);
      });
    }).catch(function(e) {
      console.log("Wake lock not granted:", e.message);
    });
  }
}
// Re-request wake lock when tab becomes visible again
document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "visible") requestWakeLock();
});

// ── Anti-freeze keepalives ────────────────────────────────────────────────────

// 1. Audio context heartbeat — keeps the browser audio pipeline alive,
//    which prevents Chrome from classifying the tab as idle/freezable.
// Audio keepalive disabled — requires user gesture in Chrome
function startAudioKeepalive() {}

// Video keepalive disabled — causes memory issues on Pi
function startVideoKeepalive() {}

// 3. Periodic DOM touch — forces browser to keep the layout active
setInterval(function() {
  var el = document.getElementById("clock-time");
  if (el) el.style.opacity = el.style.opacity === "0.99" ? "1" : "0.99";
}, 3000);

// 4. Safety net: if slide area goes blank, restart the show
setInterval(function() {
  var area = document.getElementById("slide-area");
  if (!area) return;
  var hasSlide = area.querySelector(".slide");
  if (!hasSlide && content.length > 0) {
    goToSlide(current);
  }
}, 10000);

// ── Auto-dismiss GAS "created by" banner ─────────────────────────────────────
function dismissGASBanner() {
  var selectors = [
    "button[aria-label='Close']",
    "button[aria-label='Dismiss']",
    ".script-application-dialog button",
  ];
  selectors.forEach(function(sel) {
    var el = document.querySelector(sel);
    if (el) el.click();
  });
  // Also check all buttons for dismiss-related text
  document.querySelectorAll("button, a").forEach(function(el) {
    var txt = (el.textContent || "").trim().toLowerCase();
    if (txt === "ok" || txt === "got it" || txt === "dismiss" || txt === "close") {
      el.click();
    }
  });
}
// Check every second for the first 30 seconds after load
var bannerCheckCount = 0;
var bannerInterval = setInterval(function() {
  dismissGASBanner();
  bannerCheckCount++;
  if (bannerCheckCount > 30) clearInterval(bannerInterval);
}, 1000);

// ── Hide cursor completely ────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", function() {
  document.documentElement.style.cursor = "none";
  // Inject a style tag to absolutely force cursor:none everywhere
  var style = document.createElement("style");
  style.textContent = "*, *::before, *::after { cursor: none !important; }";
  document.head.appendChild(style);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener("load", function() {
  requestWakeLock();
  startAudioKeepalive();
  startVideoKeepalive();
  loadSettings();
  scheduleRefresh();
});
</script>
